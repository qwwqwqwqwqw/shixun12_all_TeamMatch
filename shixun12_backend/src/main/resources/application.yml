spring:
  application:
    name: teammatch-backend

  profiles:
    active: local

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 25MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:teammatch}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DB:0}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # 邮件配置
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_AUTH_CODE:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath*:/mapper/**/*.xml

# 服务器配置
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

# 微信小程序配置
wechat:
  miniprogram:
    appId: ${WX_APP_ID:}
    secret: ${WX_APP_SECRET:}

# 阿里云 OSS
aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    access-key-id: ${OSS_AK_ID:}
    access-key-secret: ${OSS_AK_SECRET:}
    bucket: ${OSS_BUCKET:teammatch}
    base-url: ${OSS_BASE_URL:https://teammatch.oss-cn-beijing.aliyuncs.com}
    presign-expire-hours: ${OSS_PRESIGN_EXPIRE_HOURS:24}

# Gitee OAuth 配置
gitee:
  oauth:
    client-id: ${GITEE_CLIENT_ID:}
    client-secret: ${GITEE_CLIENT_SECRET:}
    redirect-uri: ${GITEE_REDIRECT_URI:http://localhost:8080/api/profile/gitee/callback}
    scope: user_info projects pull_requests
    public-base-url: ${GITEE_PUBLIC_BASE_URL:http://localhost:8080}

# 日志配置
logging:
  level:
    com.teammatch: INFO
    org.springframework: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"