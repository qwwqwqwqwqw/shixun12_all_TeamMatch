spring:
  # 集成测试不连真实 SMTP，但需保留 JavaMailSender Bean（EmailServiceImpl 依赖）
  mail:
    host: localhost
    port: 3025
    username: integration-test@teammatch.local
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
